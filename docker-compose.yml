version: '3.9'

services:
  client:
    build:
      context: ./client
    container_name: smart-leads-client
    ports:
      - "5173:5173"
    depends_on:
      - server
    environment:
      - VITE_API_URL=http://localhost:5000/api

  server:
    build:
      context: ./server
    container_name: smart-leads-server
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/smart-leads
      - JWT_SECRET=your_secret_key

  mongodb:
    image: mongo:latest
    container_name: smart-leads-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: